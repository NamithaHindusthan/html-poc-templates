<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cover - Insurance Brochure</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d1810 50%, #1a1a1a 100%);
      margin: 0; padding: 0; color: #FDF5E6;
      height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .container {
      background-color: #FDF5E6;
      color: #6F4E37;
      border-radius: 24px;
      padding: 40px;
      width: 210mm; /* A4 approx width */
      height: 148mm; /* half fold height approx */
      box-shadow: 0 10px 25px rgba(0,0,0,0.1), 0 5px 10px rgba(139,69,19,0.05);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 3.6rem;
      margin-bottom: 0.5rem;
      color: #8B4513;
    }
    p.subtitle {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 2rem;
      color: #8B4513;
    }
    .icon-circle {
      width: 120px; height: 120px;
      background: #D2B48C;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 16px rgba(139,69,19,0.3);
    }
    .icon-circle i {
      color: #FDF5E6;
      font-size: 5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Secure Your Future</h1>
    <p class="subtitle">Because life is unpredictable, but your family's security shouldn't be!</p>

    <div class="icon-circle"><i class="fa-solid fa-heart-pulse"></i></div>
    <p>Healthcare expenses drain your savings. Be covered before it's too late!</p>

    <div class="icon-circle"><i class="fa-solid fa-people-roof"></i></div>
    <p>Term insurance ensures your family lives with peace and safety.</p>

    <div class="icon-circle"><i class="fa-solid fa-car-crash"></i></div>
    <p>Protect your vehicle even when life takes an unexpected turn.</p>
  </div>
</body>
</html>
