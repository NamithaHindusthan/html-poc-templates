<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Insurance Brochure Preview</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #FDF5E6;
      margin: 0;
      padding: 20px;
      color: #6F4E37;
      overflow-x: hidden;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #8B4513;
      text-align: center;
      margin-bottom: 20px;
    }
    #carousel {
      width: 60vw;
      max-width: 650px;
      height: 90vh;
      margin: 0 auto;
      background-color: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(139, 69, 19, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    iframe {
      width: 210mm;
      height: 148mm; /* A4 half fold dimension */
      border: 1px solid #8B4513;
      border-radius: 12px;
      box-shadow: 1px 2px 15px rgba(139,69,19,0.3);
      background: white;
    }
    .button-row {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 210mm;
    }
    button {
      background: #D2B48C;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      padding: 10px 18px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      flex: 1;
      margin: 0 5px;
    }
    button:hover {
      background: #8B4513;
    }
  </style>
</head>
<body>
<h1>Insurance Brochure Preview</h1>
<div id="carousel">
  <iframe id="pageFrame" src="page1.html" title="Brochure Page Preview"></iframe>
  <div class="button-row">
    <button id="prevBtn"><i class="fa-solid fa-angle-left"></i> Previous</button>
    <button id="nextBtn">Next <i class="fa-solid fa-angle-right"></i></button>
  </div>
</div>

<script>
  const pages = [
    "page1.html",
    "page2.html",
    "page3.html",
    "page4.html",
    "stories.html",
    // Add extra pages as needed
  ];

  let currentIndex = 0;
  const frame = document.getElementById('pageFrame');

  function updateFrame(index) {
    currentIndex = index;
    frame.src = pages[currentIndex];
  }

  document.getElementById('prevBtn').onclick = () => {
    currentIndex = (currentIndex === 0) ? pages.length - 1 : currentIndex - 1;
    updateFrame(currentIndex);
  };

  document.getElementById('nextBtn').onclick = () => {
    currentIndex = (currentIndex === pages.length - 1) ? 0 : currentIndex + 1;
    updateFrame(currentIndex);
  };

  updateFrame(currentIndex);
</script>
</body>
</html>
